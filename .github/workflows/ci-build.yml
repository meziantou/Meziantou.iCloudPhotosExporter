name: Validate macOS build

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app (Debug)
        run: |
          set -euo pipefail
          xcodebuild \
            -project ICloudPhotoExporter.xcodeproj \
            -scheme ICloudPhotoExporter \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build
