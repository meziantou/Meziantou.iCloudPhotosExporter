name: Build and release macOS app

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example v1.0.0)"
        required: true
        type: string
      prerelease:
        description: "Publish as prerelease"
        required: false
        default: true
        type: boolean

jobs:
  build-release:
    runs-on: macos-14
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      RELEASE_PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build release app
        run: |
          set -euo pipefail
          RELEASE_VERSION="${RELEASE_TAG#v}"
          if ! [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "RELEASE_TAG must match v<major>.<minor>.<patch>, got: $RELEASE_TAG"
            exit 1
          fi

          xcodebuild \
            -project ICloudPhotoExporter.xcodeproj \
            -scheme ICloudPhotoExporter \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            MARKETING_VERSION="$RELEASE_VERSION" \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Locate app bundle
        run: |
          set -euo pipefail
          APP_PATH="$(find build/Build/Products/Release -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found in build output"
            exit 1
          fi

          APP_NAME="$(basename "$APP_PATH" .app)"
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          echo "APP_NAME=$APP_NAME" >> "$GITHUB_ENV"

      - name: Sign app bundle
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_P12_PASSWORD: ${{ secrets.MACOS_CERT_P12_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail

          if [ -n "${MACOS_CERT_P12_BASE64:-}" ] && [ -n "${MACOS_CERT_P12_PASSWORD:-}" ] && [ -n "${MACOS_SIGNING_IDENTITY:-}" ]; then
            CERT_PATH="$RUNNER_TEMP/certificate.p12"
            KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
            KEYCHAIN_PASSWORD="$(uuidgen)"

            echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH" 2>/dev/null || echo "$MACOS_CERT_P12_BASE64" | base64 -D > "$CERT_PATH"

            security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security default-keychain -s "$KEYCHAIN_PATH"
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
            security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_CERT_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
            security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

            codesign --force --deep --options runtime --timestamp --sign "$MACOS_SIGNING_IDENTITY" "$APP_PATH"
          else
            echo "Developer ID signing secrets are not configured, using ad-hoc signing."
            codesign --force --deep --sign - "$APP_PATH"
          fi

          xattr -cr "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Notarize and staple app (optional)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${APPLE_ID:-}" ] || [ -z "${APPLE_TEAM_ID:-}" ] || [ -z "${APPLE_APP_SPECIFIC_PASSWORD:-}" ]; then
            echo "Notarization secrets are not configured, skipping notarization."
            exit 0
          fi

          NOTARY_ZIP="$RUNNER_TEMP/${APP_NAME}-for-notarization.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$NOTARY_ZIP"

          xcrun notarytool submit "$NOTARY_ZIP" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait

          xcrun stapler staple "$APP_PATH"

      - name: Package binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          PACKAGE_DIR="$RUNNER_TEMP/${APP_NAME}-package"
          rm -rf "$PACKAGE_DIR"
          mkdir -p "$PACKAGE_DIR"
          cp -R "$APP_PATH" "$PACKAGE_DIR/${APP_NAME}.app"

          HELPER_SCRIPT_PATH="$PACKAGE_DIR/Open-${APP_NAME}.command"
          cat > "$HELPER_SCRIPT_PATH" <<EOF
          #!/bin/bash
          set -euo pipefail
          SCRIPT_DIR="\$(cd "\$(dirname "\$0")" && pwd)"
          APP_PATH="\$SCRIPT_DIR/${APP_NAME}.app"
          xattr -dr com.apple.quarantine "\$APP_PATH" || true
          open "\$APP_PATH"
          EOF
          chmod +x "$HELPER_SCRIPT_PATH"

          ditto -c -k --sequesterRsrc --keepParent "$PACKAGE_DIR" "dist/${APP_NAME}-${RELEASE_TAG}.zip"

          if [ -d "${APP_PATH}.dSYM" ]; then
            ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}.dSYM" "dist/${APP_NAME}-${RELEASE_TAG}.dSYM.zip"
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ICloudPhotoExporter-${{ env.RELEASE_TAG }}
          path: dist/*
          if-no-files-found: error
          retention-days: 1

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: ${{ env.RELEASE_TAG }}
          body: |
            ## Installation

            1. Download and unzip `ICloudPhotoExporter-${{ env.RELEASE_TAG }}.zip`.
            2. Move `ICloudPhotoExporter.app` to your **Applications** folder.
            3. Remove the quarantine flag, then open the app:
               ```sh
               xattr -dr com.apple.quarantine /Applications/ICloudPhotoExporter.app
               open /Applications/ICloudPhotoExporter.app
               ```
               Alternatively, double-click the included **`Open-ICloudPhotoExporter.command`** script — it removes the quarantine flag and launches the app automatically.

          generate_release_notes: true
          prerelease: ${{ env.RELEASE_PRERELEASE }}
          files: dist/*
